<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>滴动仪 · 三维交互面板</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%2365f8d3'/%3E%3Cstop offset='100%25' stop-color='%23ff9d5c'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='32' cy='32' r='30' fill='%2308161f'/%3E%3Cpath d='M32 10c6 10 8 15 8 22a8 8 0 1 1-16 0c0-7 2-12 8-22z' fill='url(%23g)'/%3E%3Ccircle cx='32' cy='44' r='7' fill='%23ffffff' fill-opacity='0.15'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="styles.css?v=20260408-sidebar-two-column" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div class="noise-overlay" aria-hidden="true"></div>
    <main class="app-shell">
      <header class="hero">
        <span class="hero__tag">DripMotion Lite</span>
        <h1>滴动仪智能交互系统</h1>
        <div id="bridgeStatus" class="bridge-status">桥接服务：未连接</div>
      </header>

      <div class="main-layout">
        <section class="viewer" aria-label="滴动仪 3D 视图">
          <canvas id="dripCanvas" aria-label="3D 模型画布" role="img"></canvas>
        </section>

        <section class="control-dock" aria-label="圆环控制面板">
        <div class="ring-controls">
          <button id="ringReset" class="control-btn control-btn--stop control-btn--tiny ring-controls__reset">复位</button>
          <div class="ring-controls__header">
            <h4>圈环控制板</h4>
          </div>
          
          <div class="ring-group">
            <h5>RingA（内环）</h5>
            <button class="control-btn" data-command="moveUp" data-ring="A">↑</button>
            <button class="control-btn" data-command="moveDown" data-ring="A">↓</button>
            <button class="control-btn" data-command="rotateLeft" data-ring="A">⮐</button>
            <button class="control-btn" data-command="rotateRight" data-ring="A">⮑</button>
            <button class="control-btn control-btn--stop" data-command="stop" data-ring="A">停</button>
          </div>
          
          <div class="ring-group">
            <h5>RingB（次内环）</h5>
            <button class="control-btn" data-command="moveUp" data-ring="B">↑</button>
            <button class="control-btn" data-command="moveDown" data-ring="B">↓</button>
            <button class="control-btn" data-command="rotateLeft" data-ring="B">⮐</button>
            <button class="control-btn" data-command="rotateRight" data-ring="B">⮑</button>
            <button class="control-btn control-btn--stop" data-command="stop" data-ring="B">停</button>
          </div>
          
          <div class="ring-group">
            <h5>RingC（次外环）</h5>
            <button class="control-btn" data-command="moveUp" data-ring="C">↑</button>
            <button class="control-btn" data-command="moveDown" data-ring="C">↓</button>
            <button class="control-btn" data-command="rotateLeft" data-ring="C">⮐</button>
            <button class="control-btn" data-command="rotateRight" data-ring="C">⮑</button>
            <button class="control-btn control-btn--stop" data-command="stop" data-ring="C">停</button>
          </div>
          
          <div class="ring-group">
            <h5>RingD（外环）</h5>
            <button class="control-btn" data-command="moveUp" data-ring="D">↑</button>
            <button class="control-btn" data-command="moveDown" data-ring="D">↓</button>
            <button class="control-btn" data-command="rotateLeft" data-ring="D">⮐</button>
            <button class="control-btn" data-command="rotateRight" data-ring="D">⮑</button>
            <button class="control-btn control-btn--stop" data-command="stop" data-ring="D">停</button>
          </div>
        </div>
        
        <!--
        <div class="flower-controls">
          <h4>花朵控制板</h4>
            <button class="control-btn" data-command="flowerOpen">打开</button>
            <button class="control-btn" data-command="flowerClose">闭合</button>
        </div>
        -->

        <!--
        <div class="part-lock-controls" aria-label="部件节点锁定调试">
          <h4>部件节点锁定</h4>
          <div class="part-debug__buttons">
            <button id="partBodyOnly" class="control-btn">仅显示主体</button>
            <button id="partRingOnly" class="control-btn">仅显示圆环</button>
            <button id="partShowAll" class="control-btn control-btn--stop">显示全部部件</button>
          </div>
        </div>
        -->
      </section>
      </div>

      <section class="insight-grid" aria-label="传感器状态">
        <article class="insight-card" id="faceCard">
          <header>
            <h2>面部交互</h2>
            <div class="header-tags">
              <span id="faceMode" class="badge">未校准</span>
              <span id="faceState" class="chip chip--idle">面部：未启动</span>
            </div>
          </header>
          <div class="video-wrapper">
            <img id="faceStream" class="insight-video" alt="面部摄像头画面" />
          </div>
          <ul id="faceGestureList" class="gesture-log" aria-label="面部识别结果">
            <li>当前环：--</li>
            <li>当前行为：等待检测...</li>
            <li>当前表情：平静</li>
            <li>当前节奏：正常</li>
            <li>表情控制：关闭</li>
          </ul>
          <div class="module-inline" aria-label="面部交互控制">
            <div class="module-inline__buttons module-inline__buttons--face">
              <button id="faceTempoToggle" class="module-btn">表情控制：关闭</button>
              <button id="faceStart" class="module-btn">开启面部交互</button>
              <button id="faceStop" class="module-btn module-btn--stop" disabled>结束面部交互</button>
            </div>
          </div>
        </article>

        <article class="insight-card" id="handCard">
          <header>
            <h2>手势交互</h2>
            <div class="header-tags">
              <span id="handLastAction" class="badge">未激活</span>
              <span id="handState" class="chip chip--idle">手势：未启动</span>
            </div>
          </header>
          <div class="video-wrapper">
            <img id="handStream" class="insight-video" alt="手势摄像头画面" />
          </div>
          <div class="module-inline" aria-label="手势交互控制">
            <div class="module-inline__buttons">
              <button id="handStart" class="module-btn">开启手势交互</button>
              <button id="handStop" class="module-btn module-btn--stop" disabled>结束手势交互</button>
            </div>
          </div>
        </article>

        <article class="insight-card" id="voiceCard">
          <header>
            <h2>语音识别</h2>
            <div class="header-tags">
              <span id="voiceBadge" class="badge">等待</span>
              <span id="voiceState" class="chip chip--idle">语音：未启动</span>
            </div>
          </header>
          <p id="voiceStatus">当前状态：等待启动...</p>
          <div class="insight-row"><span>识别内容</span><strong id="voiceTranscript">--</strong></div>
          <div class="insight-row"><span>最后命令</span><strong id="voiceCommand">--</strong></div>
          <div class="module-inline" aria-label="语音识别控制">
            <div class="module-inline__buttons">
              <button id="voiceStart" class="module-btn">开启语音识别</button>
              <button id="voiceStop" class="module-btn module-btn--stop" disabled>结束语音识别</button>
            </div>
          </div>
        </article>
      </section>

    </main>

    <script type="module" src="client-main.js?v=20260408-face-expression-tempo-v5"></script>
  </body>
</html>
