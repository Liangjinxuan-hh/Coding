name: voice-plan-422-regression

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  regression-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install bridge dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r bridge/requirements.txt

      - name: Run voice plan 422 regression check
        run: python scripts/ci_check_voice_plan_422.py